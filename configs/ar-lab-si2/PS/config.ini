[config]
launch_order = PS
launch_delay_s = 20
photostim_path = PS

[path:PS]
matlab_executable = C:\Program Files\MATLAB\R2024b\bin\matlab.exe
matlab_flags = -nosplash
simulation_mode = auto
listener_host = 0.0.0.0
listener_port = 1813
listener_auto_start = true
reply_host = 158.109.210.77
reply_port = 1814
local_data_root = F:\Local_Repository
remote_data_root = \\ar-lab-nas1\DataServer\Remote_Repository
acquisition_folder = PS
hsi_variable = hSI
hsictl_variable = hSICtl
motor_data_variable = siMotorData
startup_timeout_s = 120
command_timeout_s = 120
engine_name = opto_PS
xy_transform = @(xyz)[xyz(1) xyz(2)]
z_transform = @(xyz)xyz(3)
point_size_xy = 0,0
rotation_degrees = 0
pause_duration = 0.010
park_duration = 0.010
clear_existing = true
ignore_frequency = true
stimulus_function = point
power_scale_mode = multiply
