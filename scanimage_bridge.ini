[matlab]
matlab_executable = matlab
matlab_flags =
    -nodesktop
    -nosplash
startup_timeout_s = 60
command_timeout_s = 60
repo_matlab_path = ./matlab
launch_scanimage_command = scanimage;
shutdown_scanimage_command = if exist(''hSI'',''var''); try delete(hSI); catch; end; clear hSI; end
focus_command = hSI.startFocus();
acquire_command = hSI.startGrab();
stop_command = hSI.abort();
hsi_variable = hSI
xy_transform = @(xyz)[xyz(1) xyz(2)]
z_transform = @(xyz)xyz(3)
point_size_xy = 0,0
rotation_degrees = 0
pause_duration = 0.010
park_duration = 0.010
clear_existing = true
ignore_frequency = true
stimulus_function = point
power_scale_mode = multiply

[session:scan_path_1]
startup_commands =
    disp('Session scan_path_1 ready');

[session:scan_path_2]
startup_commands =
    disp('Session scan_path_2 ready');
